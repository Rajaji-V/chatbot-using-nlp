<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced NLP Chatbot</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --chat-bg: #ffffff;
            --user-msg: #4f46e5;
            --bot-msg: #f3f4f6;
            --text-color: #1f2937;
        }
        
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
        }
        
        .chat-container { 
            width: 100%; 
            max-width: 450px; 
            height: 85vh; 
            background: var(--chat-bg); 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        .chat-header { 
            background: var(--primary); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            font-size: 1.25rem; 
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
        }

        .chat-box { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            background: #fafafa; 
        }
        
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message-wrapper.user {
            align-self: flex-end;
        }

        .message-wrapper.bot {
            align-self: flex-start;
        }

        .message { 
            padding: 12px 16px; 
            border-radius: 18px; 
            word-wrap: break-word; 
            font-size: 0.95rem; 
            line-height: 1.4;
        }
        
        .message.bot { 
            background: var(--bot-msg); 
            color: var(--text-color); 
            border-bottom-left-radius: 4px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .message.user { 
            background: var(--user-msg); 
            color: white; 
            border-bottom-right-radius: 4px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .timestamp {
            font-size: 0.7rem;
            color: #9ca3af;
            margin-top: 4px;
            padding: 0 4px;
        }

        .message-wrapper.user .timestamp {
            text-align: right;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: var(--bot-msg);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            gap: 4px;
            align-items: center;
        }

        .typing-indicator.active {
            display: flex;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: #9ca3af;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .input-area { 
            display: flex; 
            padding: 16px; 
            border-top: 1px solid #e5e7eb; 
            background: white; 
            gap: 12px;
        }
        
        .input-area input { 
            flex: 1; 
            padding: 12px 16px; 
            border: 1px solid #e5e7eb; 
            border-radius: 24px; 
            outline: none; 
            font-size: 0.95rem; 
            transition: border-color 0.2s;
            background: #f9fafb;
        }
        
        .input-area input:focus {
            border-color: var(--primary);
            background: white;
        }

        .input-area button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            width: 44px;
            height: 44px;
            border-radius: 50%; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.1s;
        }
        
        .input-area button:hover { 
            background: var(--primary-hover); 
        }

        .input-area button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <span class="status-dot"></span>
        Advanced AI Assistant
    </div>
    <div class="chat-box" id="chat-box">
        <div class="message-wrapper bot">
            <div class="message bot">Hello! I'm your upgraded NLP assistant. Try asking me "What is Quantum Mechanics?" or telling me "I'm having a wonderful day!".</div>
            <div class="timestamp">Just now</div>
        </div>
        <div id="typing-indicator" class="typing-indicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)" autocomplete="off">
        <button onclick="sendMessage()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const typingIndicator = document.getElementById('typing-indicator');

    function getCurrentTime() {
        const now = new Date();
        return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function appendMessage(text, sender) {
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${sender}`;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        
        const timeDiv = document.createElement('div');
        timeDiv.className = 'timestamp';
        timeDiv.innerText = getCurrentTime();

        wrapper.appendChild(msgDiv);
        wrapper.appendChild(timeDiv);
        
        // Insert before typing indicator
        chatBox.insertBefore(wrapper, typingIndicator);
        scrollBottom();
    }

    function scrollBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
        typingIndicator.classList.add('active');
        scrollBottom();
    }

    function hideTyping() {
        typingIndicator.classList.remove('active');
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        
        showTyping();

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            
            // Simulate a tiny delay for natural feeling
            setTimeout(() => {
                hideTyping();
                appendMessage(data.reply, 'bot');
            }, 600);
            
        } catch (error) {
            hideTyping();
            appendMessage("Error communicating with server. Retrying might fix it.", 'bot');
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
</script>

</body>
</html>
